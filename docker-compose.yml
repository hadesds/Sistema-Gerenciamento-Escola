services:
  db:
    image: postgres:15-alpine
    container_name: cara_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: cara_escola
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: Cara2025.

  web:
    build: .
    container_name: cara_app
    command: >
        sh -c "python manage.py migrate &&
          python manage.py runserver 0.0.0.0:5433"
    volumes:
      - .:/app
      - media_root:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      # Com nginx na frente, CORS e FRONTEND_URL apontam para localhost:80
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - FRONTEND_URL=
    depends_on:
      - db
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: cara_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vazio → api.ts usa URL relativa (/api/...) — nginx roteia para o Django
      - NEXT_PUBLIC_API_URL=
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - web
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: cara_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - frontend
    restart: on-failure

volumes:
  postgres_data:
  media_root:
