services:
  - type: web
    name: projetocara-api
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn gestao_escolar.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "https://.*\\.vercel\\.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://*.vercel.app"
      - key: CLOUDINARY_URL
        sync: false
